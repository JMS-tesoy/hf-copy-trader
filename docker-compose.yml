services:
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

  backend:
    build: ./backend
    restart: always
    ports:
      - "4000:4000"
    expose:
      - "8081"
      - "8082"
      - "8083"
    env_file:
      - ./backend/docker-secrets.env   # non-root file — NOT yaml-interpolated, $ passed literally
    environment:
      # Docker-specific overrides (take priority over env_file values)
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PG_HOST=postgres
      - PG_PORT=5432
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"

  postgres:
    image: postgres:alpine
    restart: always
    environment:
      - POSTGRES_DB=${PG_DATABASE:-copy_trading}
      - POSTGRES_USER=${PG_USER:-postgres}
      - POSTGRES_PASSWORD=${PG_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE:-copy_trading}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
